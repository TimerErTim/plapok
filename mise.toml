[tools]
"cargo:wasm-opt" = "latest"
node = "lts"
pnpm = "latest"
rust = "stable"

[env]
VITE_PUBLIC_URL = "https://plapok.timerertim.eu"
VITE_SPACETIMEDB_URI = "https://maincloud.spacetimedb.com"
VITE_SPACETIMEDB_MODULE = "timerertim-plapok-01"

[tasks."prepare:web"]
description = "Prepares web deps"
dir   = "{{ config_root }}/web"
run = "pnpm install"

[tasks."check:web"]
description = "Run TypeScript type/compile checks"
dir = "{{ config_root }}/web"
depends = ["generate:spacetimedb_bindings"]
run = "pnpm run test:ts"

[tasks."check:spacetimedb"]
description = "Run Rust type/compile checks"
dir = "{{ config_root }}/spacetimedb"
run = "cargo clippy"

[tasks.check]
depends = ["check:web", "check:spacetimedb"]

[tasks."build:web"]
description = "Build frontend"
dir = "{{ config_root }}/web"
depends = ["generate:spacetimedb_bindings"]
run = "pnpm run build"

[tasks."build:spacetimedb"]
description = "Build SpacetimeDB module"
dir = "{{ config_root }}/spacetimedb"
run = [
    "spacetime build",
    "cp target/wasm32-unknown-unknown/release/plapok.opt.wasm target/wasm32-unknown-unknown/release/module.opt.wasm"
]

[tasks."generate:spacetimedb_bindings"]
description = "Generate SpacetimeDB bindings"
run = "spacetime generate --yes"

[tasks.build]
description = "Build SpacetimeDB module and frontend"
depends = ["build:spacetimedb", "build:web"]

[tasks."publish:spacetimedb"]
description = "Publish SpacetimeDB module"
wait_for = ["build:spacetimedb"]
run = [
    "spacetime logout",
    'spacetime login --token "${SPACETIME_TOKEN}"',
    "spacetime publish --yes --bin-path spacetimedb/target/wasm32-unknown-unknown/release/module.opt.wasm"
]

[tasks."dev:web"]
description = "Start frontend development server"
dir = "{{ config_root }}/web"
run = "pnpm run dev"

[tasks."dev:spacetimedb"]
description = "Start SpacetimeDB development server"
run = "spacetime dev --yes"

[tasks."dev"]
description = "Start development server"
depends = ["dev:web", "dev:spacetimedb"]
